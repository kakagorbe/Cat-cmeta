mixed-port: 7890
ipv6: true
allow-lan: true
mode: rule
log-level: info
keepalive: 25
keep-alive-idle: 10
keep-alive-interval: 15
unified-delay: false
geo-auto-update: true
geo-update-interval: 168
external-controller: '127.0.0.1:9090'
secret: 'Hpp@19921992'
external-ui: ui
# external-ui-url: 'https://github.com/haishanh/yacd/archive/gh-pages.zip'
external-ui-url: 'https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip'
external-controller-cors:
  allow-origins: ['*']
  allow-private-network: true
profile:
  store-selected: true
  store-fake-ip: true
hosts: {}
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  use-hosts: true
  use-system-hosts: false
  nameserver:
    - 'https://1.1.1.1/dns-query'
    - 'https://8.8.8.8/dns-query'
    - 'https://dns.quad9.net/dns-query'
  proxy-server-nameserver:
    - '178.22.122.100' # شکن
    - '185.51.200.2'   # شکن
    - '10.202.10.10'   # رادار
    - '10.202.10.11'   # رادار
  nameserver-policy:
    'domain:+.ir': [proxy-server-nameserver]
    'all': [nameserver]
  fallback-filter:
  geoip: true
  geoip-code: IR
  ipcidr:
    - '240.0.0.0/4'
  geosite:
    - 'cn'
  domain:
    - '+.ir'
tun:
  enable: true
  stack: gvisor
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
  - 'tcp://any:53'
  - 'udp://any:53'
  mtu: 1330
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080, 8880, 2052, 2082, 2086, 2095]
    TLS:
      ports: [443, 8443, 2053, 2083, 2087, 2096]
    QUIC:
      ports: [443, 8443]
proxies:
- name: "🇳🇱 Netherlands"
  type: wireguard
  ip: "10.2.0.2/32"
  ipv6: ""
  private-key: "qJvTGS3hC2YMHAlQssT4tecMqyZD8U5EEbzzqPTQrWQ="
  server: "212.92.104.193"
  port: 51820
  public-key: "+veOJwVuUpP9QAx4q3krdh4pTBgOyqew1TTTDnyITRg="
  pre-shared-key: ""
  allowed-ips: ["0.0.0.0/0", "::/0"]
  reserved: ""
  udp: true
  mtu: 1420
  dns: ["10.2.0.1"]
  persistent-keepalive: 0
  dialer-proxy: ""
  amnezia-wg-option:
    jc: 1
    jmin: 1
    jmax: 1
    s1: 0
    s2: 0
    h1: 1
    h2: 0
    h4: 0
    h3: 0
- name: "🇻🇳 Vietnam - WG"
  type: wireguard
  ip: "100.80.234.177/32"
  ipv6: ""
  private-key: "cIq+3tcHVT7gRMl4kIv0WE68ERiTmDtA7rhyHhLJ/mg="
  server: "103.9.79.220"
  port: 80
  public-key: "SxBT11IISNRou7thGo5A1QtaMjfzPIzZXDxdYEbDxhE="
  pre-shared-key: "N/gfMZSjvP8mbXfVP2hnD5CX8BkGvOyheJ67mCpD+QQ="
